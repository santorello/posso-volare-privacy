<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home – Posso Volare?</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --border: #e5e7eb;
      --accent: #0f62fe;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }
    h1 { margin-top: 0; font-size: 2rem; }
    p { font-size: 1.1rem; color: var(--muted); margin-bottom: 30px; }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
    .btn:hover { background: #0050e6; }
    .privacy-link {
      display: block;
      margin-top: 20px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 Posso Volare?</h1>
    <p>L'app definitiva per il supporto informativo ai piloti UAS. Valuta le condizioni di volo, consulta il meteo, l'indice Kp e le zone regolamentate in un'unica interfaccia.</p>
    
    <a href="privacy.html" class="privacy-link">📄 Consulta le Norme sulla Privacy</a>
  </div>
</body>
</html>
